<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 新闻日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .summary-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .summary-card p {
            line-height: 1.8;
            color: #333;
        }
        .news-list {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .news-item {
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }
        .news-item:last-child { border-bottom: none; }
        .news-item h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        .news-item p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .news-item .bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 500;
            margin-right: 6px;
        }
        .tag-agent { background: #E3F2FD; color: #1565C0; }
        .tag-model { background: #F3E5F5; color: #7B1FA2; }
        .tag-company { background: #FFF3E0; color: #E65100; }
        .tag-tech { background: #E8F5E9; color: #2E7D32; }
        .tag-policy { background: #FCE4EC; color: #C62828; }
        .tag-product { background: #E0F7FA; color: #00838F; }
        .tag-open-source { background: #F1F8E9; color: #558B2F; }
        .source {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7em;
            background: #f0f0f0;
            color: #888;
            margin-left: 6px;
        }
        .news-item a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
        }
        .news-item a:hover { text-decoration: underline; }
        footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI 新闻日报</h1>
            <p class="subtitle" id="date-display">加载中...</p>
        </header>

        <div class="summary-card">
            <h2>📰 今日要闻</h2>
            <p id="summary">加载中...</p>
        </div>

        <div class="news-list" id="news-list">
            <p style="text-align: center; color: #999;">加载中...</p>
        </div>

        <footer>
            <p>每日 8:30 自动更新 | <a href="https://github.com/CocoDuan2/ai-news-daily" style="color: white;">GitHub</a></p>
        </footer>
    </div>

    <script>
        const tagLabels = {
            'agent': 'Agent',
            'model': '模型',
            'company': '公司',
            'tech': '技术',
            'policy': '政策',
            'product': '产品',
            'open-source': '开源'
        };

        async function loadLatestNews() {
            try {
                const indexRes = await fetch('data/index.json');
                const dates = await indexRes.json();
                const latestDate = dates[dates.length - 1];

                document.getElementById('date-display').textContent = latestDate;

                const newsRes = await fetch(`data/${latestDate}.json`);
                const data = await newsRes.json();

                document.getElementById('summary').textContent = data.summary || '暂无总结';

                const newsList = document.getElementById('news-list');
                newsList.innerHTML = data.news.map((item, idx) => {
                    const cat = item.category || '';
                    const tagClass = cat ? `tag-${cat}` : '';
                    const tagLabel = tagLabels[cat] || '';
                    return `
                        <div class="news-item">
                            <h3>${idx + 1}. ${item.title}</h3>
                            <p>${item.summary}</p>
                            <div class="bottom">
                                <div>
                                    ${cat ? `<span class="tag ${tagClass}">${tagLabel}</span>` : ''}
                                    ${item.source ? `<span class="source">${item.source}</span>` : ''}
                                </div>
                                ${item.url ? `<a href="${item.url}" target="_blank" rel="noopener">阅读原文 →</a>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('news-list').innerHTML = '<p style="text-align: center; color: #999;">加载失败</p>';
            }
        }

        loadLatestNews();
    </script>
</body>
</html>
