<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日AI新闻</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        h1 { color: #333; border-bottom: 3px solid #4CAF50; padding-bottom: 10px; }
        .date { color: #666; font-size: 0.9em; }
        .news-item { margin: 20px 0; padding: 15px; background: #f9f9f9; border-left: 4px solid #4CAF50; }
        .news-item h3 { margin-top: 0; }
        a { color: #4CAF50; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🤖 每日AI新闻精选</h1>
    <p class="date">最后更新：<span id="update-time">加载中...</span></p>
    <div id="news-container">加载中...</div>
    <script>
        fetch('news.json')
            .then(r => r.json())
            .then(data => {
                document.getElementById('update-time').textContent = data.date;
                const container = document.getElementById('news-container');
                container.innerHTML = data.news.map((item, i) => `
                    <div class="news-item">
                        <h3>${i + 1}. ${item.title}</h3>
                        <p>${item.summary}</p>
                        ${item.url ? `<a href="${item.url}" target="_blank">阅读原文 →</a>` : ''}
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
